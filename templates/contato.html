<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">

<body style="background-color: #FDF5E6;">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-dark text-white text-center py-3 fw-bold">✉️ ENVIAR MENSAGEM</div>

                <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">

                    <input type="hidden" name="_next" value="https://pertodecasase.onrender.com/"> <div class="mb-3"><label class="small fw-bold">NOME</label><input type="text" name="nome" class="form-control" required></div>

                    <div class="mb-3"><label class="small fw-bold">MENSAGEM</label><textarea name="message" class="form-control" rows="4" required></textarea></div>

            </div>
        </div>
    </div>
    <footer style="text-align: center; padding: 40px 0; color: #5D4037;">

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suporte - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; min-height: 100vh; display: flex; flex-direction: column; }
        .nav-premium { background-color: #C84B31; border-bottom: 4px solid #F9A825; padding: 12px 0; }
        .card-contato { border-radius: 25px; border: none; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="nav-premium sticky-top shadow-sm">
        <div class="container d-flex justify-content-between align-items-center px-3">
            <a href="/" class="text-white text-decoration-none fw-bold">📍 Perto de Casa SE</a>
            <a href="/" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-bold border-0">← Início</a>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                <div class="card card-contato overflow-hidden">
                    <div class="card-header py-4 text-center text-white bg-dark">
                        <h4 class="mb-0 fw-bold">✉️ Central de Suporte</h4>
                    </div>
                    <div class="card-body p-4 p-md-5 bg-white">
                        <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
                            <input type="hidden" name="_captcha" value="false">
                            <input type="hidden" name="_next" value="https://pertodecasa.onrender.com/">
                            <div class="mb-4"><label class="fw-bold small text-muted text-uppercase mb-2">Seu Nome</label><input type="text" name="name" class="form-control p-3" required></div>
                            <div class="mb-4"><label class="fw-bold small text-muted text-uppercase mb-2">E-mail</label><input type="email" name="email" class="form-control p-3" required></div>
                            <div class="mb-4"><label class="fw-bold small text-muted text-uppercase mb-2">Mensagem</label><textarea name="message" class="form-control p-3" rows="5" required></textarea></div>
                            <button type="submit" class="btn btn-warning w-100 fw-bold py-3 rounded-pill shadow">ENVIAR AGORA</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center py-5 text-muted small">
        Desenvolvido por Caju Valley Tecnologia @pertodecasase 🌵
    </footer>
</body>
</html>

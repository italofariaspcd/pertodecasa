<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<body style="background-color: #FDF5E6;">
    <div class="container py-5" style="max-width: 500px;">
        <div class="card border-0 shadow rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white text-center py-3 fw-bold">✉️ FALE CONOSCO</div>
            <div class="card-body p-4">
                <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="https://pertodecasa.onrender.com/">

                    <div class="mb-3"><label class="small fw-bold text-muted">MENSAGEM</label><textarea name="message" class="form-control rounded-3" rows="4" required></textarea></div>
                    
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 rounded-pill shadow">ENVIAR AGORA</button>
                    <div class="text-center mt-3"><a href="/" class="text-muted small fw-bold text-decoration-none">← VOLTAR AO INÍCIO</a></div>
                </form>
            </div>
        </div>
    </div>

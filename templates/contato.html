<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Fale Conosco - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; display: flex; flex-direction: column; min-height: 100vh; }
        .bg-barro { background-color: #C84B31; color: white; }
        .btn-sol { background-color: #F9A825; color: #333; transition: 0.3s; border: none; }
        .btn-sol:hover { background-color: #F57F17; color: #333; }
        .content { flex: 1; }
        .rodape-nordeste { background-color: #EEDCC6; color: #5D4037; border-top: 2px solid #C84B31; }
    </style>
</head>
<body>
    <header class="py-3 shadow-sm bg-barro">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 600px;">
            <h1 class="h5 mb-0 fw-bold">📍 Perto de Casa SE</h1>
            <a href="/" class="text-white text-decoration-none small fw-bold">Voltar ao Início</a>
        </div>
    </header>

    <div class="container mt-5 mb-5 content" style="max-width: 600px;">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white py-3 text-center">
                <h4 class="mb-0 fw-bold">✉️ Fale Conosco</h4>
            </div>
            <div class="card-body p-4 bg-white">
                <p class="text-muted text-center mb-4">Tem alguma dúvida, sugestão ou precisa de ajuda? Envie uma mensagem para nós!</p>
                
                <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
                    
                    <input type="hidden" name="_subject" value="Novo Contato - Perto de Casa SE">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="https://www.pertodecasase.com.br/">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Seu Nome</label>
                        <input type="text" class="form-control bg-light" name="nome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Seu E-mail</label>
                        <input type="email" class="form-control bg-light" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mensagem</label>
                        <textarea class="form-control bg-light" name="mensagem" rows="5" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-sol w-100 fw-bold py-2 fs-5">Enviar Mensagem</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 mt-auto rodape-nordeste">
        <p class="mb-0 small fw-bold">Feito no Nordeste 🌵 Desenvolvido por <span style="color: #C84B31;">Caju Valley Tecnologia</span></p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Suporte - Caju Valley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #e8dcc4; height: 100vh; display: flex; align-items: center; flex-direction: column; justify-content: center;">
    <a href="/" class="btn btn-outline-dark mb-4 rounded-pill">← VOLTAR AO INÍCIO</a>
    <div class="card p-5 shadow border-0" style="border-radius: 30px; width: 100%; max-width: 500px;">
        <h4 class="fw-bold text-center mb-4" style="color: #953d15;">✉️ SUPORTE CAJU VALLEY</h4>
        <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
            <input type="text" name="name" class="form-control mb-3" placeholder="Seu Nome" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Seu E-mail" required>
            <textarea name="message" class="form-control mb-4" rows="4" placeholder="Como podemos ajudar?" required></textarea>
            <button type="submit" class="btn w-100 py-3 fw-bold text-white shadow" style="background: #a7bc72; border-radius: 15px;">ENVIAR AGORA</button>
        </form>
    </div>
</body>
</html>

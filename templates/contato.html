<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte - Caju Valley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #e8dcc4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }</style>
</head>
<body>
    <div class="card p-5 shadow border-0" style="border-radius: 30px; width: 100%; max-width: 500px;">
        <h4 class="fw-bold text-center mb-4" style="color: #953d15;">✉️ SUPORTE CAJU VALLEY</h4>
        <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
            <input type="text" name="name" class="form-control mb-3 p-3" placeholder="Seu Nome" required>
            <input type="email" name="email" class="form-control mb-3 p-3" placeholder="Seu E-mail" required>
            <textarea name="message" class="form-control mb-4 p-3" rows="4" placeholder="Como podemos ajudar?" required></textarea>
            <button type="submit" class="btn w-100 py-3 fw-bold text-white shadow" style="background: #a7bc72; border-radius: 15px;">ENVIAR AGORA</button>
            <div class="text-center mt-3"><a href="/" class="text-muted small fw-bold text-decoration-none">← VOLTAR AO INÍCIO</a></div>
        </form>
    </div>
</body>
</html>

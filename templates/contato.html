<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --terracota: #953d15; --caramelo: #c57d4c; --fundo-dark: #e8dcc4; }
        body { background-color: var(--fundo-dark); min-height: 100vh; display: flex; flex-direction: column; }
        .nav-premium { background-color: var(--terracota); border-bottom: 4px solid var(--caramelo); padding: 15px 0; }
        .card-contato { border-radius: 30px; border: none; box-shadow: 0 15px 40px rgba(0,0,0,0.15); margin-top: 40px; }
        .btn-enviar { background: #a7bc72; color: white; font-weight: bold; border-radius: 15px; padding: 15px; border: none; width: 100%; }
        .rodape { background-color: #d8cbb3; color: #5d4037; border-top: 2px solid var(--terracota); padding: 30px 0; text-align: center; margin-top: auto; }
    </style>
</head>
<body>
    <nav class="nav-premium sticky-top shadow">
        <div class="container d-flex justify-content-between align-items-center px-3">
            <a href="/" class="text-white text-decoration-none fw-bold fs-5">📍 Perto de Casa SE</a>
            <a href="/" class="btn btn-outline-light border-0 btn-sm rounded-pill px-3 fw-bold" style="border: 1px solid white !important;">← INÍCIO</a>
        </div>
    </nav>
    <div class="container py-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                <div class="card card-contato overflow-hidden">
                    <div class="card-header py-4 text-center text-white border-0" style="background-color: var(--terracota);">
                        <h4 class="mb-0 fw-bold">✉️ Suporte Caju Valley</h4>
                    </div>
                    <div class="card-body p-4 p-md-5 bg-white">
                        <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
                            <input type="hidden" name="_next" value="https://pertodecasa.onrender.com/">
                            <div class="mb-4"><label class="fw-bold small text-muted">SEU NOME</label><input type="text" name="name" class="form-control" style="border-radius: 12px;" required></div>
                            <div class="mb-4"><label class="fw-bold small text-muted">E-MAIL</label><input type="email" name="email" class="form-control" style="border-radius: 12px;" required></div>
                            <div class="mb-4"><label class="fw-bold small text-muted">MENSAGEM</label><textarea name="message" class="form-control" style="border-radius: 12px;" rows="4" required></textarea></div>
                            <button type="submit" class="btn-enviar shadow">ENVIAR MENSAGEM</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="rodape">Caju Valley Tecnologia 🌵</footer>
</body>
</html>

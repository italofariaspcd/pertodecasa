<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-barro { background-color: #C84B31; color: white; }
        .btn-sol { background-color: #F9A825; color: #333; font-weight: bold; border: none; }
        .rodape-nordeste { background-color: #EEDCC6; color: #5D4037; border-top: 2px solid #C84B31; margin-top: auto; }
    </style>
</head>
<body>
    <header class="py-3 bg-barro shadow-sm text-center"><h1 class="h5 mb-0 fw-bold">📍 Perto de Casa SE</h1></header>
    <div class="container mt-5 flex-grow-1" style="max-width: 500px;">
        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white text-center py-3">ENVIAR MENSAGEM</div>
            <div class="card-body p-4 bg-white">
                <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
                    <input type="hidden" name="_captcha" value="false">
                    <div class="mb-3"><label class="form-label small fw-bold">SEU NOME</label><input type="text" name="nome" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label small fw-bold">SEU E-MAIL</label><input type="email" name="email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label small fw-bold">COMO PODEMOS AJUDAR?</label><textarea name="message" class="form-control" rows="4" required></textarea></div>
                    <button type="submit" class="btn btn-sol w-100 py-2">ENVIAR AGORA</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3"><a href="/" class="text-muted small fw-bold text-decoration-none">← VOLTAR AO INÍCIO</a></div>
    </div>
    <footer class="text-center py-4 rodape-nordeste mt-5">
        <p class="mb-0 small fw-bold">Feito no Nordeste 🌵 Desenvolvido por <span style="color: #C84B31;">Caju Valley Tecnologia</span></p>
    </footer>
</body>
</html>

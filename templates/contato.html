<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --terracota: #953d15; --fundo: #e8dcc4; }
        body { background-color: var(--fundo); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .card-contato { border-radius: 30px; border: none; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .btn-enviar { background: #a7bc72; color: white; font-weight: bold; border-radius: 15px; padding: 15px; border: none; width: 100%; }
    </style>
</head>
<body>
    <div class="container py-5"><div class="row justify-content-center"><div class="col-12 col-md-6"><div class="card card-contato overflow-hidden">
        <div class="card-header py-4 text-center text-white border-0" style="background: var(--terracota);"><h4 class="mb-0 fw-bold">✉️ Suporte Caju Valley</h4></div>
        <div class="card-body p-4 p-md-5 bg-white"><form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
            <div class="mb-4"><label class="fw-bold small text-muted">NOME</label><input type="text" name="name" class="form-control" style="border-radius: 12px;" required></div>
            <div class="mb-4"><label class="fw-bold small text-muted">E-MAIL</label><input type="email" name="email" class="form-control" style="border-radius: 12px;" required></div>
            <div class="mb-4"><label class="fw-bold small text-muted">MENSAGEM</label><textarea name="message" class="form-control" style="border-radius: 12px;" rows="4" required></textarea></div>
            <button type="submit" class="btn-enviar shadow">ENVIAR AGORA</button>
            <div class="text-center mt-4"><a href="/" class="text-muted small text-decoration-none fw-bold">← VOLTAR</a></div>
        </form></div>
    </div></div></div></div>
</body>
</html>

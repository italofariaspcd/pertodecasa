<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-barro { background-color: #C84B31; color: white; }
        .rodape-nordeste { background-color: #EEDCC6; color: #5D4037; border-top: 2px solid #C84B31; margin-top: auto; padding: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <header class="py-3 bg-barro shadow-sm text-center">
        <h1 class="h5 mb-0 fw-bold">📍 Perto de Casa SE</h1>
    </header>

    <div class="container mt-5 mb-5 flex-grow-1" style="max-width: 500px;">
        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white text-center py-3 fw-bold">✉️ ENVIAR MENSAGEM</div>
            <div class="card-body p-4 bg-white">
                <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_subject" value="Novo Contato - Perto de Casa SE">
                    <input type="hidden" name="_next" value="https://pertodecasase.onrender.com/">

                    <div class="mb-3">
                        <label class="small fw-bold text-muted">SEU NOME</label>
                        <input type="text" name="name" class="form-control rounded-3" placeholder="Como te chamamos?" required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">SEU E-MAIL</label>
                        <input type="email" name="email" class="form-control rounded-3" placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">MENSAGEM</label>
                        <textarea name="message" class="form-control rounded-3" rows="4" placeholder="Dúvidas ou sugestões..." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 rounded-pill shadow-sm">ENVIAR MENSAGEM</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3"><a href="/" class="text-muted small fw-bold text-decoration-none">← VOLTAR AO INÍCIO</a></div>
    </div>

    <footer class="rodape-nordeste">
        <p class="mb-1 small fw-bold">Feito no Nordeste 🌵</p>
        <p class="mb-0 small">Desenvolvido por <strong>Caju Valley Tecnologia</strong> @pertodecasase</p>
    </footer>
</body>
</html>

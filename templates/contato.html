<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; min-height: 100vh; display: flex; flex-direction: column; }
        .card-contato { border-radius: 25px; border: none; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .btn-inicio { border-radius: 15px; padding: 12px; font-weight: 600; text-decoration: none; display: inline-block; margin-bottom: 20px; color: #C84B31; border: 2px solid #C84B31; }
    </style>
</head>
<body>
    <div class="container py-5 flex-grow-1">
        <a href="/" class="btn-inicio">← Voltar ao Início</a>

        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                <div class="card card-contato overflow-hidden">
                    <div class="card-header py-4 text-center text-white" style="background-color: #333;">
                        <h4 class="mb-0 fw-bold">✉️ Central de Suporte</h4>
                    </div>
                    <div class="card-body p-4 p-md-5 bg-white">
                        <form action="https://formsubmit.co/italofariaspcd@gmail.com" method="POST">
                            <input type="hidden" name="_captcha" value="false">
                            <input type="hidden" name="_next" value="https://pertodecasa.onrender.com/">
                            
                            <div class="mb-4">
                                <label class="fw-bold small text-muted text-uppercase mb-2">Seu Nome</label>
                                <input type="text" name="name" class="form-control rounded-3 p-3" placeholder="Como te chamamos?" required>
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold small text-muted text-uppercase mb-2">E-mail para resposta</label>
                                <input type="email" name="email" class="form-control rounded-3 p-3" placeholder="seu@email.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold small text-muted text-uppercase mb-2">Como podemos ajudar?</label>
                                <textarea name="message" class="form-control rounded-3 p-3" rows="5" placeholder="Dúvidas, sugestões ou suporte técnico..." required></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-warning w-100 fw-bold py-3 rounded-pill shadow">ENVIAR MENSAGEM</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="text-center py-4 text-muted small">
        Desenvolvido por Caju Valley Tecnologia @pertodecasase 🌵
    </footer>
</body>
</html>

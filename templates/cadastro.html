<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; display: flex; flex-direction: column; min-height: 100vh; }
        .bg-barro { background-color: #C84B31; color: white; }
        .btn-mandacaru { background-color: #2E8B57; color: white; transition: 0.3s; }
        .btn-mandacaru:hover { background-color: #1e633d; color: white; }
        .content { flex: 1; }
        .rodape-nordeste { background-color: #EEDCC6; color: #5D4037; border-top: 2px solid #C84B31; }
    </style>
</head>
<body>
    <header class="py-3 shadow-sm bg-barro">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 600px;">
            <h1 class="h5 mb-0 fw-bold">📍 Perto de Casa SE</h1>
            <a href="/" class="text-white text-decoration-none small fw-bold">Início</a>
        </div>
    </header>

    <div class="container mt-4 mb-5 content" style="max-width: 600px;">
        <div class="card shadow border-0">
            <div class="card-header bg-barro py-3 text-center">
                <h4 class="mb-0 fw-bold">Cadastrar Serviço</h4>
            </div>
            <div class="card-body p-4 bg-white">
                <form action="/cadastrar" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo ou Empresa</label>
                        <input type="text" class="form-control bg-light" name="nome" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">WhatsApp (com DDD)</label>
                            <input type="text" class="form-control bg-light" name="telefone" placeholder="Ex: 79999999999" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Cidade</label>
                            <input type="text" class="form-control bg-light" name="cidade" value="Capela" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Instagram ou Facebook (Opcional)</label>
                        <input type="text" class="form-control bg-light" name="redes_sociais" placeholder="Ex: @seuperfil">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoria</label>
                        <select class="form-select bg-light" name="categoria_id" required>
                            <option value="">Selecione...</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}">{{ cat.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição</label>
                        <textarea class="form-control bg-light" name="descricao" rows="3" placeholder="O que você faz de melhor?" required></textarea>
                    </div>

                    <div class="alert mb-4 shadow-sm border-0" style="background-color: #FFF3E0; color: #E65100; border-left: 4px solid #FF9800 !important;">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="taxa" name="taxaMensal" required value="true">
                            <label class="form-check-label small" for="taxa">
                                Estou ciente e concordo com a taxa de manutenção de <strong>R$ 20,00 mensais</strong>. Caso não haja pagamento, o perfil será ocultado das buscas.
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-mandacaru w-100 fw-bold py-2">Finalizar Cadastro</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 mt-auto rodape-nordeste">
        <p class="mb-0 small fw-bold">Feito no Nordeste 🌵 Desenvolvido por <span style="color: #C84B31;">Caju Valley Tecnologia</span></p>
    </footer>
</body>
</html>

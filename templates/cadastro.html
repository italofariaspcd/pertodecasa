<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Anunciar - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e8dcc4;
            color: #2d1a12;
            padding-bottom: 50px;
        }

        .form-card {
            background: white;
            border-radius: 30px;
            border: none;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 14px;
            border: 2px solid #eee;
            margin-bottom: 5px;
        }

        .form-control:focus {
            border-color: #953d15;
            box-shadow: none;
        }

        label {
            font-weight: bold;
            font-size: 0.85rem;
            color: #953d15;
            margin-left: 5px;
        }

        .btn-final {
            background: #a7bc72;
            color: white;
            border-radius: 15px;
            padding: 18px;
            font-weight: bold;
            border: none;
            font-size: 1.1rem;
            width: 100%;
            transition: 0.3s;
        }

        .btn-final:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <div class="text-center mb-4">
            <a href="/" class="btn btn-outline-dark rounded-pill px-4 fw-bold shadow-sm">← VOLTAR AO INÍCIO</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-7">
                <div class="form-card p-4 p-md-5">
                    <h2 class="fw-bold text-center mb-4" style="color: #953d15;">Dados do Seu Anúncio</h2>

                    <form action="/processar-cadastro" method="POST">
                        <div class="mb-3"><label>NOME PROFISSIONAL / EMPRESA</label><input type="text" name="nome"
                                class="form-control" placeholder="Como você é conhecido?" required></div>

                        <div class="row">
                            <div class="col-12 col-md-6 mb-3"><label>WHATSAPP (DDD + NÚMERO)</label><input type="tel"
                                    name="telefone" class="form-control" placeholder="79999..." required></div>
                            <div class="col-12 col-md-6 mb-3"><label>INSTAGRAM (OPCIONAL)</label><input type="text"
                                    name="redes_sociais" class="form-control" placeholder="@seu.perfil"></div>
                        </div>

                        <div class="row">
                            <div class="col-8 col-md-9 mb-3"><label>RUA / LOGRADOURO</label><input type="text"
                                    name="endereco" class="form-control" required></div>
                            <div class="col-4 col-md-3 mb-3"><label>Nº</label><input type="text" name="numero"
                                    class="form-control" required></div>
                        </div>

                        <div class="mb-3"><label>CIDADE EM SERGIPE</label><select name="cidade" class="form-select"
                                required>{% for c in cidades %}<option value="{{ c }}">{{ c }}</option>{% endfor
                                %}</select></div>

                        <div class="mb-3"><label>CATEGORIA DO SERVIÇO</label><select name="categoria_id"
                                class="form-select" required>{% for cat in categorias %}<option value="{{ cat.id }}">{{
                                    cat.nome }}</option>{% endfor %}</select></div>

                        <div class="mb-4"><label>DESCRIÇÃO DO QUE VOCÊ FAZ</label><textarea name="descricao"
                                class="form-control" rows="4"
                                placeholder="Ex: Atendimento 24h, aceito cartão, 10 anos de experiência..."
                                required></textarea></div>

                        <div class="alert mb-4 border-0"
                            style="background: #fff8f0; color: #953d15; border-radius: 15px; font-size: 0.9rem;">
                            <b>⚠️ ATENÇÃO:</b> Taxa de <b>R$ 10,00 mensal</b> para manter o anúncio ativo. Cobranças via
                            WhatsApp.
                            <div class="mt-2"><input type="checkbox" required> Li e aceito os termos.</div>
                        </div>

                        <button type="submit" class="btn-final shadow-lg">FINALIZAR E ATIVAR</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

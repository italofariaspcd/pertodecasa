<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #FDF5E6;">
    <div class="container py-5" style="max-width: 600px;">
        <div class="card border-0 shadow rounded-4 overflow-hidden">
            <div class="card-header text-white text-center py-3" style="background-color: #C84B31;">
                <h4 class="mb-0 fw-bold">Anunciar Meu Serviço</h4>
            </div>
            <div class="card-body p-4 bg-white">
                <form action="/cadastrar" method="POST">
                    <div class="mb-3"><label class="fw-bold small">NOME DA EMPRESA OU PRESTADOR</label><input type="text" class="form-control" name="nome" required></div>
                    <div class="row">
                        <div class="col-6 mb-3"><label class="fw-bold small">WHATSAPP (DDD)</label><input type="tel" class="form-control" name="telefone" placeholder="799..." required></div>
                        <div class="col-6 mb-3"><label class="fw-bold small">REDES SOCIAIS</label><input type="text" class="form-control" name="redes_sociais" placeholder="@seuperfil"></div>
                    </div>
                    <div class="row">
                        <div class="col-8 mb-3"><label class="fw-bold small">ENDEREÇO (RUA/AV)</label><input type="text" class="form-control" name="endereco" required></div>
                        <div class="col-4 mb-3"><label class="fw-bold small">NÚMERO</label><input type="text" class="form-control" name="numero" required></div>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">CIDADE DE SERGIPE</label>
                        <select class="form-select" name="cidade" required>
                            <option value="">Selecione seu município...</option>
                            {% for cid in cidades %}<option value="{{ cid }}">{{ cid }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">CATEGORIA</label>
                        <select class="form-select" name="categoria_id" required>
                            {% for cat in categorias %}<option value="{{ cat.id }}">{{ cat.nome }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="mb-3"><label class="fw-bold small">O QUE VOCÊ FAZ?</label><textarea class="form-control" name="descricao" rows="3" required></textarea></div>
                    
                    <div class="alert mb-4 border-0" style="background-color: #FFF3E0; color: #E65100; border-left: 5px solid #FF9800 !important; font-size: 0.9rem;">
                        <input type="checkbox" name="taxa" required> Estou ciente da taxa de <strong>R$ 10,00 mensais</strong>. 
                        <br>⚠️ Cobranças via WhatsApp.
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm">PUBLICAR ANÚNCIO</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

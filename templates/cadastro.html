<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Perto de Casa Sergipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-header text-white" style="background-color: #B7410E;">
                <h3 class="mb-0 text-center">Cadastrar Serviço</h3>
            </div>
            <div class="card-body">
                <form action="/cadastrar" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Profissional ou Empresa</label>
                        <input type="text" class="form-control" name="nome" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">WhatsApp (com DDD)</label>
                        <input type="text" class="form-control" name="telefone" placeholder="Ex: 79999999999" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Cidade</label>
                        <input type="text" class="form-control" name="cidade" value="Capela" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoria</label>
                        <select class="form-select" name="categoria_id" required>
                            <option value="">Selecione...</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}">{{ cat.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição do Serviço</label>
                        <textarea class="form-control" name="descricao" rows="3" required></textarea>
                    </div>

                    <div class="alert alert-warning">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="taxaMensal" name="taxaMensal" required value="true">
                            <label class="form-check-label" for="taxaMensal" style="font-size: 0.9em;">
                                Estou ciente e concordo que há uma taxa de manutenção de <strong>R$ 20,00 mensais</strong>. Caso o pagamento não seja feito, meu perfil será ocultado das buscas.
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold" style="background-color: #2E7D32;">Finalizar Cadastro</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

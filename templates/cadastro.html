<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-barro { background-color: #C84B31; }
        .form-label { font-weight: bold; font-size: 0.8rem; color: #5D4037; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; }
        .btn-mandacaru { background-color: #2E8B57; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5" style="max-width: 600px;">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-barro text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Cadastrar Meu Serviço</h4>
            </div>
            <div class="card-body p-4 bg-white">
                <form action="/cadastrar" method="POST">
                    <div class="mb-3">
                        <label class="form-label">NOME DA EMPRESA OU PRESTADOR</label>
                        <input type="text" class="form-control shadow-sm" name="nome" required>
                    </div>

                    <div class="row">
                        <div class="col-12 col-md-6 mb-3">
                            <label class="form-label">CEL / WHATSAPP (DDD)</label>
                            <input type="tel" class="form-control shadow-sm" name="telefone" placeholder="79999999999" required>
                        </div>
                        <div class="col-12 col-md-6 mb-3">
                            <label class="form-label">REDES SOCIAIS</label>
                            <input type="text" class="form-control shadow-sm" name="redes_sociais" placeholder="@seuperfil">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-8 mb-3">
                            <label class="form-label">ENDEREÇO (RUA/AV)</label>
                            <input type="text" class="form-control shadow-sm" name="endereco" required>
                        </div>
                        <div class="col-4 mb-3">
                            <label class="form-label">NÚMERO</label>
                            <input type="text" class="form-control shadow-sm" name="numero" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">CIDADE (SERGIPE)</label>
                        <select class="form-select shadow-sm" name="cidade" required>
                            <option value="">Selecione...</option>
                            {% for cid in cidades %}<option value="{{ cid }}">{{ cid }}</option>{% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">CATEGORIA</label>
                        <select class="form-select shadow-sm" name="categoria_id" required>
                            <option value="">Selecione...</option>
                            {% for cat in categorias %}<option value="{{ cat.id }}">{{ cat.nome }}</option>{% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">DESCREVA SEU SERVIÇO</label>
                        <textarea class="form-control shadow-sm" name="descricao" rows="3" required></textarea>
                    </div>
                    
                    <div class="alert mb-4 border-0 shadow-sm" style="background-color: #FFF3E0; color: #E65100; border-left: 5px solid #FF9800 !important; font-size: 0.85rem;">
                        <input class="form-check-input me-2" type="checkbox" name="taxaMensal" required value="true">
                        Estou ciente da taxa de <strong>R$ 10,00 mensais</strong>. 
                        <br><br>⚠️ Utilize seu <strong>WhatsApp real</strong>, as cobranças são enviadas por ele.
                    </div>

                    <button type="submit" class="btn btn-mandacaru w-100 shadow">FINALIZAR E PUBLICAR</button>
                    <div class="text-center mt-3"><a href="/" class="text-muted small fw-bold text-decoration-none">← VOLTAR AO INÍCIO</a></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anunciar - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --terracota: #953d15; --caramelo: #c57d4c; --oliva: #a7bc72; --fundo-dark: #e8dcc4; }
        body { background-color: var(--fundo-dark); min-height: 100vh; display: flex; flex-direction: column; font-size: 16px; }
        .nav-premium { background-color: var(--terracota); border-bottom: 4px solid var(--caramelo); padding: 15px 0; }
        .card-cadastro { border-radius: 30px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.12); margin-top: 20px; width: 100%; }
        .form-control, .form-select { border-radius: 15px; padding: 18px; border: 2px solid #ddd; font-size: 16px; }
        .btn-salvar { background: var(--oliva); color: white; font-weight: bold; border-radius: 20px; padding: 20px; border: none; font-size: 1.2rem; width: 100%; }
        .rodape { background-color: #d8cbb3; color: #5d4037; border-top: 2px solid var(--terracota); padding: 30px 0; text-align: center; margin-top: auto; }
    </style>
</head>
<body>
    <nav class="nav-premium sticky-top shadow">
        <div class="container d-flex justify-content-between align-items-center px-3">
            <a href="/" class="text-white text-decoration-none fw-bold fs-5">📍 Perto de Casa SE</a>
            <a href="/" class="text-white text-decoration-none small fw-bold" style="border: 2px solid white; padding: 5px 15px; border-radius: 50px;">← VOLTAR</a>
        </div>
    </nav>
    <div class="container py-4 flex-grow-1">
        <div class="card card-cadastro mx-auto" style="max-width: 800px;">
            <div class="card-body p-4 p-md-5 bg-white">
                <h2 class="fw-bold mb-4 text-center" style="color: var(--terracota);">Anunciar Meu Serviço</h2>
                <form action="/cadastrar" method="POST">
                    <div class="mb-4"><label class="fw-bold small text-muted">NOME PROFISSIONAL</label><input type="text" class="form-control" name="nome" required></div>
                    <div class="row">
                        <div class="col-md-6 mb-4"><label class="fw-bold small text-muted">WHATSAPP</label><input type="tel" class="form-control" name="telefone" required></div>
                        <div class="col-md-6 mb-4"><label class="fw-bold small text-muted">INSTAGRAM</label><input type="text" class="form-control" name="redes_sociais" placeholder="@seuperfil"></div>
                    </div>
                    <div class="row">
                        <div class="col-8 col-md-9 mb-4"><label class="fw-bold small text-muted">RUA / LOGRADOURO</label><input type="text" class="form-control" name="endereco" required></div>
                        <div class="col-4 col-md-3 mb-4"><label class="fw-bold small text-muted">Nº</label><input type="text" class="form-control" name="numero" required></div>
                    </div>
                    <div class="mb-4"><label class="fw-bold small text-muted">CIDADE EM SERGIPE</label>
                        <select class="form-select" name="cidade" required>
                            {% for cid in cidades %}<option value="{{ cid }}">{{ cid }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="mb-4"><label class="fw-bold small text-muted">CATEGORIA</label>
                        <select class="form-select" name="categoria_id" required>
                            {% for cat in categorias %}<option value="{{ cat.id }}">{{ cat.nome }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="mb-4"><label class="fw-bold small text-muted">DESCRIÇÃO</label><textarea class="form-control" name="descricao" rows="4" placeholder="Fale sobre seu trabalho..." required></textarea></div>
                    <div class="alert mb-4 border-0" style="background: #fff8f0; color: #953d15; border-radius: 20px;">
                        <input type="checkbox" required> Ciente da taxa de <b>R$ 10,00 mensal</b> para manter o anúncio.
                    </div>
                    <button type="submit" class="btn-salvar shadow-lg">FINALIZAR E PUBLICAR</button>
                </form>
            </div>
        </div>
    </div>
    <footer class="rodape">Caju Valley Tecnologia 🌵</footer>
</body>
</html>

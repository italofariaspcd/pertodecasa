<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcf9f2; }
        .bg-terra { background-color: #8D6E63; color: white; }
        .btn-verde { background-color: #558B2F; color: white; }
    </style>
</head>
<body>
    <div class="container mt-5 mb-5" style="max-width: 600px;">
        <div class="card shadow border-0">
            <div class="card-header bg-terra py-3 text-center">
                <h4 class="mb-0 fw-bold">Cadastrar Serviço</h4>
            </div>
            <div class="card-body p-4 bg-white">
                <form action="/cadastrar" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo ou Empresa</label>
                        <input type="text" class="form-control" name="nome" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">WhatsApp (DDD)</label>
                            <input type="text" class="form-control" name="telefone" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Cidade</label>
                            <input type="text" class="form-control" name="cidade" value="Capela" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Instagram ou Facebook (Opcional)</label>
                        <input type="text" class="form-control" name="redes_sociais" placeholder="Ex: @seuperfil">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoria</label>
                        <select class="form-select" name="categoria_id" required>
                            <option value="">Selecione...</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}">{{ cat.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição</label>
                        <textarea class="form-control" name="descricao" rows="3" required></textarea>
                    </div>

                    <div class="alert alert-warning mb-4 shadow-sm border-0">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="taxa" name="taxaMensal" required value="true">
                            <label class="form-check-label small" for="taxa">
                                Estou ciente e concordo com a taxa de manutenção de <strong>R$ 20,00 mensais</strong>. Caso não haja pagamento, o perfil será ocultado.
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-verde w-100 fw-bold py-2">Finalizar Cadastro</button>
                    <div class="text-center mt-3"><a href="/" class="text-muted small">Voltar ao site</a></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anunciar - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; min-height: 100vh; font-size: 16px; }
        .header-top { background-color: #C84B31; border-bottom: 4px solid #F9A825; padding: 15px 0; }
        .card-cadastro { border-radius: 30px; border: none; box-shadow: 0 15px 45px rgba(0,0,0,0.1); margin-top: -30px; }
        .btn-salvar { background-color: #2E8B57; color: white; font-weight: bold; border-radius: 18px; padding: 18px; border: none; font-size: 1.1rem; }
        .form-label { font-weight: 700; color: #C84B31; margin-bottom: 8px; font-size: 0.95rem; }
        .form-control, .form-select { border-radius: 15px; padding: 15px; border: 2px solid #eee; background-color: #fff; }
        .btn-voltar { color: white; text-decoration: none; font-weight: 700; border: 2px solid white; padding: 8px 20px; border-radius: 50px; font-size: 0.9rem; transition: 0.3s; }
        .btn-voltar:hover { background: white; color: #C84B31; }
    </style>
</head>
<body>
    <div class="header-top text-center pb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="btn-voltar">← Início</a>
            <h5 class="text-white mb-0 fw-bold">Cadastro Profissional</h5>
            <div style="width: 80px;"></div> </div>
    </div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card card-cadastro">
                    <div class="card-body p-4 p-md-5">
                        <form action="/cadastrar" method="POST">
                            <div class="mb-4">
                                <label class="form-label">NOME OU EMPRESA</label>
                                <input type="text" class="form-control" name="nome" placeholder="Ex: João da Pintura" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">WHATSAPP (DDD)</label>
                                    <input type="tel" class="form-control" name="telefone" placeholder="79999999999" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">REDES SOCIAIS</label>
                                    <input type="text" class="form-control" name="redes_sociais" placeholder="@seu.perfil">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-8 mb-4">
                                    <label class="form-label">LOGRADOURO / RUA</label>
                                    <input type="text" class="form-control" name="endereco" required>
                                </div>
                                <div class="col-4 mb-4">
                                    <label class="form-label">Nº</label>
                                    <input type="text" class="form-control" name="numero" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">MUNICÍPIO EM SERGIPE</label>
                                <select class="form-select" name="cidade" required>
                                    <option value="">Selecione o local...</option>
                                    {% for cid in cidades %}<option value="{{ cid }}">{{ cid }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">ESPECIALIDADE DO SERVIÇO</label>
                                <select class="form-select" name="categoria_id" required>
                                    {% for cat in categorias %}<option value="{{ cat.id }}">{{ cat.nome }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">DESCRIÇÃO DOS SERVIÇOS</label>
                                <textarea class="form-control" name="descricao" rows="5" placeholder="Descreva seus diferenciais, horários e formas de pagamento..." required></textarea>
                            </div>
                            
                            <div class="alert p-4 mb-4 border-0 text-center" style="background-color: #FFF3E0; border-radius: 20px;">
                                <div class="form-check d-inline-block text-start">
                                    <input class="form-check-input" type="checkbox" name="taxa" required>
                                    <label class="form-check-label fw-bold" style="color: #E65100;">
                                        Aceito a taxa mensal de R$ 10,00
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-salvar w-100 shadow-lg">FINALIZAR E ANUNCIAR</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="text-center py-5 text-muted small">
        Desenvolvido por Caju Valley Tecnologia @pertodecasase 🌵
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; min-height: 100vh; padding-bottom: 50px; }
        .card-cadastro { border-radius: 30px; border: none; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .btn-salvar { background-color: #2E8B57; color: white; font-weight: bold; border-radius: 18px; padding: 18px; font-size: 1.1rem; transition: 0.3s; }
        .btn-salvar:hover { background-color: #246d45; box-shadow: 0 5px 15px rgba(46, 139, 87, 0.3); }
        .form-label { font-weight: 700; color: #C84B31; font-size: 0.95rem; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 15px; padding: 15px; border: 2px solid #eee; background-color: #fcfcfc; }
        .form-control:focus { border-color: #F9A825; box-shadow: none; background-color: #fff; }
        .btn-inicio { border-radius: 15px; padding: 12px; font-weight: 600; text-decoration: none; display: inline-block; margin-bottom: 20px; color: #C84B31; border: 2px solid #C84B31; transition: 0.3s; }
        .btn-inicio:hover { background-color: #C84B31; color: white; }
    </style>
</head>
<body>
    <div class="container py-4">
        <a href="/" class="btn-inicio">← Voltar ao Início</a>
        
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card card-cadastro">
                    <div class="card-header bg-white border-0 pt-5 text-center">
                        <h2 class="fw-bold" style="color: #C84B31;">Anunciar Serviço</h2>
                        <p class="text-muted">Alcance mais clientes em todo o estado</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form action="/cadastrar" method="POST">
                            <div class="mb-4">
                                <label class="form-label">NOME DA EMPRESA OU PROFISSIONAL</label>
                                <input type="text" class="form-control" name="nome" placeholder="Ex: João da Elétrica" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">WHATSAPP (DDD + NÚMERO)</label>
                                    <input type="tel" class="form-control" name="telefone" placeholder="79999999999" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">INSTAGRAM (OPCIONAL)</label>
                                    <input type="text" class="form-control" name="redes_sociais" placeholder="@seu.perfil">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-8 col-md-9 mb-4">
                                    <label class="form-label">ENDEREÇO / LOGRADOURO</label>
                                    <input type="text" class="form-control" name="endereco" placeholder="Rua, Avenida..." required>
                                </div>
                                <div class="col-4 col-md-3 mb-4">
                                    <label class="form-label">Nº</label>
                                    <input type="text" class="form-control" name="numero" placeholder="123" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">CIDADE EM SERGIPE</label>
                                <select class="form-select" name="cidade" required>
                                    <option value="">Selecione o município...</option>
                                    {% for cid in cidades %}<option value="{{ cid }}">{{ cid }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">CATEGORIA DO SERVIÇO</label>
                                <select class="form-select" name="categoria_id" required>
                                    {% for cat in categorias %}<option value="{{ cat.id }}">{{ cat.nome }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">DESCRIÇÃO DETALHADA</label>
                                <textarea class="form-control" name="descricao" rows="5" placeholder="Conte o que você faz, horários, diferenciais..." required></textarea>
                            </div>
                            
                            <div class="alert p-4 mb-4 border-0" style="background-color: #FFF3E0; border-radius: 20px;">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="taxa" id="taxaCheck" required>
                                    <label class="form-check-label fw-bold" for="taxaCheck" style="color: #E65100;">
                                        Aceito a taxa de manutenção de R$ 10,00/mês.
                                    </label>
                                </div>
                                <small class="d-block mt-2 text-muted">A cobrança será enviada via WhatsApp após a aprovação do cadastro.</small>
                            </div>

                            <button type="submit" class="btn btn-salvar w-100 shadow">PUBLICAR MEU ANÚNCIO AGORA</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

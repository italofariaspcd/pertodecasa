<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anunciar - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --terracota: #953d15; --caramelo: #c57d4c; --oliva: #a7bc72; --fundo: #e8dcc4; }
        body { background-color: var(--fundo); min-height: 100vh; font-size: 16px; }
        .nav-premium { background: var(--terracota); border-bottom: 4px solid var(--caramelo); padding: 15px 0; }
        .card-cadastro { border-radius: 30px; border: none; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-top: 20px; }
        .form-control, .form-select { border-radius: 12px; padding: 15px; border: 1px solid #ddd; }
        .btn-salvar { background: var(--oliva); color: white; font-weight: bold; border-radius: 15px; padding: 18px; border: none; width: 100%; font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav class="nav-premium shadow sticky-top"><div class="container d-flex justify-content-between">
        <a href="/" class="text-white text-decoration-none fw-bold fs-5">📍 Perto de Casa SE</a>
        <a href="/" class="text-white text-decoration-none small fw-bold" style="border: 2px solid white; padding: 5px 15px; border-radius: 50px;">VOLTAR</a>
    </div></nav>

    <div class="container py-4">
        <div class="card card-cadastro mx-auto" style="max-width: 800px;">
            <div class="card-body p-4 p-md-5 bg-white">
                <h2 class="fw-bold mb-4 text-center" style="color: var(--terracota);">Anunciar Meu Serviço</h2>
                <form action="/cadastrar" method="POST">
                    <div class="mb-4"><label class="fw-bold small text-muted">NOME PROFISSIONAL / EMPRESA</label><input type="text" name="nome" class="form-control" required></div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-4"><label class="fw-bold small text-muted">WHATSAPP (COM DDD)</label><input type="tel" name="telefone" class="form-control" placeholder="799..." required></div>
                        <div class="col-md-6 mb-4"><label class="fw-bold small text-muted">INSTAGRAM (OPCIONAL)</label><input type="text" name="redes_sociais" class="form-control" placeholder="@seu.perfil"></div>
                    </div>

                    <div class="row">
                        <div class="col-8 col-md-9 mb-4"><label class="fw-bold small text-muted">RUA / LOGRADOURO</label><input type="text" name="endereco" class="form-control" required></div>
                        <div class="col-4 col-md-3 mb-4"><label class="fw-bold small text-muted">Nº</label><input type="text" name="numero" class="form-control" required></div>
                    </div>

                    <div class="mb-4"><label class="fw-bold small text-muted">CIDADE EM SERGIPE</label>
                        <select name="cidade" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for cid in cidades %}<option value="{{ cid }}">{{ cid }}</option>{% endfor %}
                        </select>
                    </div>

                    <div class="mb-4"><label class="fw-bold small text-muted">CATEGORIA DO SERVIÇO</label>
                        <select name="categoria_id" class="form-select" required>
                            <option value="">O que você faz?</option>
                            {% for cat in categorias %}<option value="{{ cat.id }}">{{ cat.nome }}</option>{% endfor %}
                        </select>
                    </div>

                    <div class="mb-4"><label class="fw-bold small text-muted">DESCRIÇÃO DOS SERVIÇOS</label>
                        <textarea name="descricao" class="form-control" rows="4" placeholder="Fale sobre seu trabalho, horários e diferenciais..." required></textarea>
                    </div>

                    <div class="alert mb-4 border-0" style="background: #fff8f0; color: #953d15; border-radius: 15px;">
                        <input type="checkbox" required> Confirmo os dados e estou ciente da taxa mensal de R$ 10,00, para a manutenção do anúncio.
                    </div>

                    <button type="submit" class="btn-salvar shadow-lg">FINALIZAR E ANUNCIAR</button>
                </form>
            </div>
        </div>
    </div>
    <footer class="text-center py-4" style="color: #5d4037;">Caju Valley Tecnologia 🌵</footer>
</body>
</html>

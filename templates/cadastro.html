<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>🏠 Anunciar - Perto de Casa SE</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #e8dcc4; padding: 40px 0;">
    <div class="container">
        <div class="text-center mb-4"><a href="/" class="btn btn-outline-dark rounded-pill">← VOLTAR AO INÍCIO</a></div>
        <div class="card border-0 shadow-lg mx-auto" style="max-width: 750px; border-radius: 30px;">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold mb-4 text-center" style="color: #953d15;">Criar Meu Anúncio</h2>
                <form action="/processar-cadastro" method="POST">
                    <div class="mb-3"><label class="small fw-bold">NOME PROFISSIONAL</label><input type="text"
                            name="nome" class="form-control" required></div>
                    <div class="row mb-3">
                        <div class="col-6"><label class="small fw-bold">WHATSAPP</label><input type="tel"
                                name="telefone" class="form-control" placeholder="79..." required></div>
                        <div class="col-6"><label class="small fw-bold">INSTAGRAM</label><input type="text"
                                name="redes_sociais" class="form-control" placeholder="@seu.perfil"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-8"><label class="small fw-bold">RUA/LOGRADOURO</label><input type="text"
                                name="endereco" class="form-control" required></div>
                        <div class="col-4"><label class="small fw-bold">Nº</label><input type="text" name="numero"
                                class="form-control" required></div>
                    </div>
                    <div class="mb-3"><label class="small fw-bold">CIDADE</label><select name="cidade"
                            class="form-select" required>{% for c in cidades %}<option value="{{ c }}">{{ c }}</option>
                            {% endfor %}</select></div>
                    <div class="mb-3"><label class="small fw-bold">CATEGORIA</label><select name="categoria_id"
                            class="form-select" required>{% for cat in categorias %}<option value="{{ cat.id }}">{{
                                cat.nome }}</option>{% endfor %}</select></div>
                    <div class="mb-4"><label class="small fw-bold">DESCRIÇÃO DOS SERVIÇOS</label><textarea
                            name="descricao" class="form-control" rows="4" required></textarea></div>
                    <div class="alert small border-0 py-3 mb-4"
                        style="background: #fff8f0; color: #953d15; border-radius: 15px;">
                        ⚠️ <b>Taxa Mensal: R$ 10,00</b>. O atraso no pagamento suspende o anúncio. Todas as cobranças
                        são feitas via WhatsApp.
                        <div class="mt-2"><input type="checkbox" required> Estou ciente e aceito as condições.</div>
                    </div>
                    <button type="submit" class="btn w-100 py-3 fw-bold text-white shadow"
                        style="background: #a7bc72; border-radius: 12px; border: none;">CONCLUIR ANÚNCIO</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>

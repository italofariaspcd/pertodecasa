<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Perto de Casa Nordeste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --cor-terracota: #B7410E; --cor-areia: #FAF3E0; --cor-mandacaru: #2E7D32; --cor-sol: #FF6F00; }
        body { background-color: var(--cor-areia); font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: var(--cor-terracota); }
        .btn-salvar { background-color: var(--cor-mandacaru); color: white; border: none; font-weight: bold; }
        .btn-salvar:hover { background-color: #1b5e20; color: white; }
        .form-control:focus { border-color: var(--cor-sol); box-shadow: 0 0 0 0.25rem rgba(255, 111, 0, 0.25); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4 py-3">
        <div class="container">
            <a href="/" class="btn btn-outline-light d-flex align-items-center gap-2 border-0">
                <span class="material-icons">arrow_back</span> Voltar
            </a>
            <span class="text-white fw-bold h5 mb-0">Cadastro de Profissional</span>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0 shadow rounded-4 p-4">
                    
                    {% if msg_sucesso %}
                        <div class="alert alert-success text-center">
                            <h5>🌵 {{ msg_sucesso }}</h5>
                            <a href="/" class="btn btn-success mt-2">Ir testar na busca</a>
                        </div>
                    {% endif %}

                    {% if msg_erro %}
                        <div class="alert alert-danger">{{ msg_erro }}</div>
                    {% endif %}

                    <form action="/cadastro" method="post">
                        <h5 class="text-secondary border-bottom pb-2 mb-3">Seus Dados</h5>
                        
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" name="full_name" class="form-control" required placeholder="Maria da Silva">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">WhatsApp (Com DDD)</label>
                                <input type="tel" name="whatsapp" class="form-control" placeholder="79999998888" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Instagram (Opcional)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light">@</span>
                                    <input type="text" name="instagram" class="form-control" placeholder="seunegocio">
                                </div>
                            </div>
                        </div>

                        <h5 class="text-secondary border-bottom pb-2 mt-4 mb-3">Sobre o Serviço</h5>
                        <div class="mb-3">
                            <label class="form-label">Bairro de Atendimento</label>
                            <input type="text" name="address_neighborhood" class="form-control" placeholder="Ex: Jabotiana" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">O que você faz? (Resumo)</label>
                            <textarea name="bio" class="form-control" rows="3" placeholder="Ex: Faço bolos para festas..."></textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Categorias:</label>
                            <div class="card p-2 border bg-light" style="max-height: 200px; overflow-y: auto;">
                                {% for cat in categorias %}
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="category_ids" value="{{ cat.id }}" id="cat{{ cat.id }}">
                                    <label class="form-check-label" for="cat{{ cat.id }}">{{ cat.name }}</label>
                                </div>
                                {% endfor %}
                            </div>
                        </div>

                        <button type="submit" class="btn btn-salvar w-100 py-2">CRIAR MEU PERFIL</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

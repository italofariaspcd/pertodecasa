<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --terracota: #953d15; --caramelo: #c57d4c; --oliva: #a7bc72; --fundo: #e8dcc4; }
        body { background-color: var(--fundo); min-height: 100vh; font-size: 16px; }
        .nav-premium { background: var(--terracota); border-bottom: 4px solid var(--caramelo); padding: 15px 0; }
        .form-control, .form-select { border-radius: 12px; padding: 15px; border: 1px solid #ddd; }
        .btn-salvar { background: var(--oliva); color: white; font-weight: bold; border-radius: 15px; padding: 18px; border: none; width: 100%; font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav class="nav-premium shadow sticky-top"><div class="container d-flex justify-content-between px-3">
        <a href="/" class="text-white text-decoration-none fw-bold fs-5">📍 Perto de Casa SE</a>
        <a href="/" class="text-white text-decoration-none small fw-bold" style="border: 2px solid white; padding: 5px 15px; border-radius: 50px;">← INÍCIO</a>
    </div></nav>
    <div class="container py-4"><div class="card border-0 mx-auto shadow-lg" style="max-width: 850px; border-radius: 30px;"><div class="card-body p-4 p-md-5 bg-white rounded-5">
        <h2 class="fw-bold mb-4 text-center" style="color: var(--terracota);">Criar Meu Anúncio</h2>
        <form action="/cadastrar" method="POST">
            <div class="mb-4"><label class="fw-bold small text-muted">NOME DO PROFISSIONAL</label><input type="text" name="nome" class="form-control" required></div>
            <div class="row"><div class="col-md-6 mb-4"><label class="fw-bold small text-muted">WHATSAPP (DDD)</label><input type="tel" name="telefone" class="form-control" placeholder="799..." required></div><div class="col-md-6 mb-4"><label class="fw-bold small text-muted">INSTAGRAM</label><input type="text" name="redes_sociais" class="form-control" placeholder="@seu.perfil"></div></div>
            <div class="row"><div class="col-8 col-md-9 mb-4"><label class="fw-bold small text-muted">LOGRADOURO/RUA</label><input type="text" name="endereco" class="form-control" required></div><div class="col-4 col-md-3 mb-4"><label class="fw-bold small text-muted">Nº</label><input type="text" name="numero" class="form-control" required></div></div>
            <div class="mb-4"><label class="fw-bold small text-muted">CIDADE EM SERGIPE</label><select name="cidade" class="form-select" required><option value="">Selecione...</option>{% for c in cidades %}<option value="{{ c }}">{{ c }}</option>{% endfor %}</select></div>
            <div class="mb-4"><label class="fw-bold small text-muted">CATEGORIA</label><select name="categoria_id" class="form-select" required><option value="">O que você faz?</option>{% for cat in categorias %}<option value="{{ cat.id }}">{{ cat.nome }}</option>{% endfor %}</select></div>
            <div class="mb-4"><label class="fw-bold small text-muted">DESCRIÇÃO</label><textarea name="descricao" class="form-control" rows="4" required></textarea></div>
            
            <div class="alert mb-4 border-0" style="background: #fff8f0; color: #953d15; border-radius: 15px; font-size: 0.9rem;">
                <b>⚠️ IMPORTANTE:</b> O anúncio possui uma taxa de <b>R$ 10,00 mensal</b>. A falta de pagamento resultará na suspensão imediata. As cobranças e suporte são realizados via WhatsApp.
                <div class="mt-2"><input type="checkbox" required> Estou ciente e aceito os termos.</div>
            </div>
            <button type="submit" class="btn-salvar shadow-lg">FINALIZAR ANÚNCIO</button>
        </form>
    </div></div></div>
</body>
</html>

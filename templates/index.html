<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏠 Perto de Casa SE</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --fundo: #e8dcc4;
            --terracota: #953d15;
            --escuro: #2d1a12;
            --oliva: #a7bc72;
            --caramelo: #c57d4c;
        }

        body {
            background-color: var(--fundo);
            color: var(--escuro);
            overflow-x: hidden;
        }

        /* Navbar Responsiva */
        .nav-custom {
            background: var(--terracota);
            border-bottom: 4px solid var(--caramelo);
            padding: 12px 0;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        @media (max-width: 576px) {
            .logo-text {
                font-size: 1.2rem;
            }
        }

        /* Busca Adaptável */
        .search-container {
            background: white;
            border-radius: 50px;
            padding: 6px;
            border: 2px solid var(--caramelo);
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        .search-input {
            border: none;
            padding: 10px 20px;
            flex-grow: 1;
            outline: none;
            border-radius: 50px 0 0 50px;
            font-size: 1rem;
        }

        .btn-busca {
            background: var(--caramelo);
            color: white;
            border-radius: 50px;
            padding: 10px 25px;
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }

        @media (max-width: 576px) {
            .search-container {
                border-radius: 15px;
                flex-direction: column;
                padding: 10px;
            }

            .search-input {
                width: 100%;
                text-align: center;
                margin-bottom: 8px;
            }

            .btn-busca {
                width: 100%;
                border-radius: 10px;
            }
        }

        /* Cards de Profissionais */
        .card-prof {
            border-radius: 20px;
            border-left: 8px solid var(--oliva);
            border: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        .card-prof:hover {
            transform: translateY(-3px);
        }

        .btn-whatsapp {
            background: var(--oliva);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            padding: 14px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        /* Botão Flutuante */
        .btn-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--terracota);
            color: white;
            border-radius: 50px;
            padding: 15px 25px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            border: none;
        }

        @media (max-width: 576px) {
            .btn-float {
                padding: 12px 20px;
                font-size: 0.9rem;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>

<body>
    <nav class="nav-custom sticky-top shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="logo-text">🏠 Perto de Casa SE</a>
            <div class="d-flex gap-2">
                <a href="/contato" class="btn btn-sm text-white border-0">Ajuda</a>
                <a href="/cadastrar" class="btn btn-light rounded-pill btn-sm fw-bold px-3">Anunciar</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="text-center py-5">
            <h1 class="display-5 fw-bold mb-4" style="color: var(--terracota);">Serviços em Sergipe</h1>
            <div class="px-2">
                <form action="/" method="GET" class="search-container shadow-sm">
                    <input type="text" name="q" class="search-input"
                        placeholder="O que você procura? (Ex: Pedreiro, Socorro...)" value="{{ termo or '' }}">
                    <button type="submit" class="btn-busca">BUSCAR</button>
                </form>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                {% for p in profissionais %}
                <div class="card card-prof p-3 p-md-4 bg-white">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h3 class="h4 fw-bold mb-0" style="color: var(--terracota);">{{ p.nome }}</h3>
                        <span class="badge bg-light text-dark border">📍 {{ p.cidade }}</span>
                    </div>
                    <div class="mb-3"><span class="small fw-bold text-muted text-uppercase">{{ p.categoria.nome
                            }}</span></div>
                    <p class="text-secondary small mb-3">{{ p.descricao }}</p>
                    <div class="p-2 bg-light rounded-3 mb-3 small">
                        🏠 {{ p.endereco }}, {{ p.numero }}
                    </div>
                    <a href="https://wa.me/55{{ p.telefone }}" target="_blank" class="btn-whatsapp shadow-sm">CHAMAR NO
                        WHATSAPP</a>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>

    <button class="btn-float" data-bs-toggle="modal" data-bs-target="#m">📝 ORÇAMENTO</button>

    <footer class="text-center py-5" style="background: var(--escuro); color: var(--fundo);">
        <p class="mb-1 fw-bold">Caju Valley Tecnologia 🌵</p>
        <p class="small opacity-75">@pertodecasase • 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

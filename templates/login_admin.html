<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>🏠 Login - Admin</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body
    style="background-color: #e8dcc4; height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
    <a href="/" class="btn btn-outline-dark mb-4 rounded-pill">← VOLTAR</a>
    <div class="card p-4 shadow border-0" style="border-radius: 20px; width: 320px;">
        <h5 class="fw-bold text-center mb-3">ACESSO RESTRITO</h5>
        {% if erro %}<div class="alert alert-danger py-2 small text-center">Senha incorreta!</div>{% endif %}
        <form action="/admin-dashboard" method="POST">
            <input type="password" name="senha" class="form-control mb-3" placeholder="Senha Mestre" required>
            <button type="submit" class="btn w-100 fw-bold text-white" style="background: #953d15;">ENTRAR</button>
        </form>
    </div>
</body>

</html>

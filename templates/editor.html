<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0 text-center">✏️ Editar Profissional</h5>
            </div>
            <div class="card-body p-4 bg-white">
                <form action="/admin/editar/{{ profissional.id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome</label>
                        <input type="text" class="form-control" name="nome" value="{{ profissional.nome }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">WhatsApp</label>
                            <input type="text" class="form-control" name="telefone" value="{{ profissional.telefone }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Cidade</label>
                            <input type="text" class="form-control" name="cidade" value="{{ profissional.cidade }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Rede Social</label>
                        <input type="text" class="form-control" name="redes_sociais" value="{{ profissional.redes_sociais or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoria</label>
                        <select class="form-select" name="categoria_id" required>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}" {% if cat.id == profissional.categoria_id %}selected{% endif %}>{{ cat.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição</label>
                        <textarea class="form-control" name="descricao" rows="3" required>{{ profissional.descricao }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Salvar Alterações</button>
                    <div class="text-center mt-3"><a href="/admin" class="text-muted small">Cancelar</a></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

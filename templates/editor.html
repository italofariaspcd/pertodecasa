<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Profissional - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-barro { background-color: #C84B31; color: white; }
        .rodape-nordeste { background-color: #EEDCC6; color: #5D4037; border-top: 2px solid #C84B31; margin-top: auto; }
    </style>
</head>
<body>
    <header class="py-3 shadow-sm bg-dark text-white text-center">
        <h1 class="h5 mb-0 fw-bold">✏️ EDITAR CADASTRO</h1>
    </header>

    <div class="container mt-5 mb-5 flex-grow-1" style="max-width: 600px;">
        <div class="card shadow border-0 overflow-hidden" style="border-radius: 15px;">
            <div class="card-body p-4 bg-white">
                <form action="/admin/editar/{{ profissional.id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">Nome ou Empresa</label>
                        <input type="text" class="form-control" name="nome" value="{{ profissional.nome }}" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold small text-muted text-uppercase">WhatsApp</label>
                            <input type="text" class="form-control" name="telefone" value="{{ profissional.telefone }}" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold small text-muted text-uppercase">Cidade</label>
                            <input type="text" class="form-control" name="cidade" value="{{ profissional.cidade }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">Rede Social</label>
                        <input type="text" class="form-control" name="redes_sociais" value="{{ profissional.redes_sociais or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">Categoria</label>
                        <select class="form-select" name="categoria_id" required>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}" {% if cat.id == profissional.categoria_id %}selected{% endif %}>{{ cat.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">Descrição</label>
                        <textarea class="form-control" name="descricao" rows="4" required>{{ profissional.descricao }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">SALVAR ALTERAÇÕES</button>
                    <div class="text-center mt-3"><a href="/admin" class="text-muted small fw-bold">CANCELAR</a></div>
                </form>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 rodape-nordeste">
        <p class="mb-0 small fw-bold">Painel Admin 🌵 <span style="color: #C84B31;">Caju Valley Tecnologia</span></p>
    </footer>
</body>
</html>

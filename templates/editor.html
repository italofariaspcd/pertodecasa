<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; display: flex; flex-direction: column; min-height: 100vh;}
        .bg-barro { background-color: #C84B31; color: white; }
        .content { flex: 1; }
        .rodape-nordeste { background-color: #EEDCC6; color: #5D4037; border-top: 2px solid #C84B31; }
    </style>
</head>
<body>
    <header class="py-3 shadow-sm bg-barro">
        <div class="container d-flex justify-content-center align-items-center" style="max-width: 600px;">
            <h1 class="h5 mb-0 fw-bold">📍 Perto de Casa SE</h1>
        </div>
    </header>

    <div class="container mt-5 content" style="max-width: 600px;">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0 text-center fw-bold">✏️ Editar Profissional</h5>
            </div>
            <div class="card-body p-4 bg-white">
                <form action="/admin/editar/{{ profissional.id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome</label>
                        <input type="text" class="form-control bg-light" name="nome" value="{{ profissional.nome }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">WhatsApp</label>
                            <input type="text" class="form-control bg-light" name="telefone" value="{{ profissional.telefone }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Cidade</label>
                            <input type="text" class="form-control bg-light" name="cidade" value="{{ profissional.cidade }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Redes Sociais</label>
                        <input type="text" class="form-control bg-light" name="redes_sociais" value="{{ profissional.redes_sociais or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoria</label>
                        <select class="form-select bg-light" name="categoria_id" required>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}" {% if cat.id == profissional.categoria_id %}selected{% endif %}>{{ cat.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição</label>
                        <textarea class="form-control bg-light" name="descricao" rows="3" required>{{ profissional.descricao }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Salvar Alterações</button>
                    <div class="text-center mt-3"><a href="/admin" class="text-muted small fw-bold">Cancelar</a></div>
                </form>
            </div>
        </div>
    </div>
    
    <footer class="text-center py-4 mt-auto rodape-nordeste">
        <p class="mb-0 small fw-bold">Painel Administrativo 🌵 <span style="color: #C84B31;">Caju Valley Tecnologia</span></p>
    </footer>
</body>
</html>

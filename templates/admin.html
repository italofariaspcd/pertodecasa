<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --terracota: #953d15; --caramelo: #c57d4c; --fundo-dark: #e8dcc4; }
        body { background-color: var(--fundo-dark); min-height: 100vh; }
        .nav-admin { background-color: var(--terracota); padding: 15px 0; color: white; }
    </style>
</head>
<body>
    <nav class="nav-admin shadow mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 fw-bold">⚙️ Gestão de Anúncios</h1>
            <a href="/login-admin" class="btn btn-light btn-sm fw-bold">Sair</a>
        </div>
    </nav>
    <div class="container">
        <div class="table-responsive bg-white p-3 rounded-4 shadow-sm">
            <table class="table table-hover align-middle">
                <thead>
                    <tr class="small text-muted">
                        <th>PROFISSIONAL</th>
                        <th>CIDADE</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in profissionais %}
                    <tr>
                        <td>
                            <b>{{ p.nome }}</b><br>
                            <small class="text-uppercase" style="font-size: 0.7rem;">{{ p.categoria.nome }}</small>
                            {% if p.is_destaque %}<span class="badge bg-warning text-dark ms-2">⭐ Destaque</span>{% endif %}
                        </td>
                        <td>📍 {{ p.cidade }}</td>
                        <td>
                            <a href="/admin/deletar/{{ p.id }}" class="btn btn-sm btn-outline-danger border-0" onclick="return confirm('Excluir este anúncio?')">🗑️ Deletar</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin - Perto de Casa SE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌵</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FDF5E6; display: flex; flex-direction: column; min-height: 100vh; }
        .bg-barro { background-color: #C84B31; color: white; }
        .rodape-nordeste { background-color: #EEDCC6; color: #5D4037; border-top: 2px solid #C84B31; margin-top: auto; }
    </style>
</head>
<body>
    <header class="py-3 shadow-sm bg-barro text-center text-white"><h1 class="h5 mb-0 fw-bold">⚙️ ADMINISTRAÇÃO</h1></header>
    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-end mb-3"><a href="/" class="btn btn-outline-dark btn-sm fw-bold">Voltar ao Site</a></div>
        <div class="table-responsive shadow-sm rounded bg-white p-2">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark small">
                    <tr><th>Nome</th><th>Contato</th><th>Status</th><th class="text-center">Ações</th></tr>
                </thead>
                <tbody class="small">
                    {% for prof in profissionais %}
                    <tr>
                        <td class="fw-bold">{{ prof.nome }}</td>
                        <td>{{ prof.telefone }}</td>
                        <td>{% if prof.ativo %}<span class="badge bg-success">Online</span>{% else %}<span class="badge bg-danger">Oculto</span>{% endif %}</td>
                        <td class="text-center">
                            <a href="/admin/alternar/{{ prof.id }}" class="btn btn-sm btn-secondary mx-1">👁️</a>
                            <a href="/admin/editar/{{ prof.id }}" class="btn btn-sm btn-primary mx-1">✏️ Editar</a>
                            <a href="/admin/deletar/{{ prof.id }}" class="btn btn-sm btn-danger mx-1" onclick="return confirm('Excluir definitivamente?')">🗑️</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <footer class="text-center py-4 rodape-nordeste">
        <p class="mb-0 small fw-bold">Painel Admin 🌵 <span style="color: #C84B31;">Caju Valley Tecnologia</span></p>
    </footer>
</body>
</html>

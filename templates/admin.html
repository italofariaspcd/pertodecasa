<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>🏠 Painel Master - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f1ea;
            padding: 20px;
            font-size: 0.85rem;
        }

        .admin-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .form-edit {
            font-size: 0.8rem;
            padding: 5px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="admin-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Gestão Perto de Casa</h4>
                <div>
                    <a href="/admin/exportar" class="btn btn-success btn-sm rounded-pill px-3">Baixar Base (CSV)</a>
                    <a href="/" class="btn btn-dark btn-sm rounded-pill px-3">Sair</a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>NOME</th>
                            <th>CONTATO</th>
                            <th>CIDADE</th>
                            <th>RUA</th>
                            <th>Nº</th>
                            <th>DESTAQUE</th>
                            <th>AÇÃO</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in profissionais %}
                        <tr>
                            <form action="/admin/editar/{{ p.id }}" method="POST">
                                <td><input type="text" name="nome" value="{{ p.nome }}" class="form-control form-edit">
                                </td>
                                <td><input type="text" name="telefone" value="{{ p.telefone }}"
                                        class="form-control form-edit"></td>
                                <td><input type="text" name="cidade" value="{{ p.cidade }}"
                                        class="form-control form-edit"></td>
                                <td><input type="text" name="endereco" value="{{ p.endereco }}"
                                        class="form-control form-edit"></td>
                                <td><input type="text" name="numero" value="{{ p.numero }}"
                                        class="form-control form-edit" style="width: 60px;"></td>
                                <td>
                                    <select name="is_destaque" class="form-select form-edit">
                                        <option value="True" {% if p.is_destaque %}selected{% endif %}>Sim</option>
                                        <option value="False" {% if not p.is_destaque %}selected{% endif %}>Não</option>
                                    </select>
                                </td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                                        <a href="/admin/deletar/{{ p.id }}" class="btn btn-danger btn-sm"
                                            onclick="return confirm('Excluir?')">🗑️</a>
                                    </div>
                                </td>
                            </form>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>

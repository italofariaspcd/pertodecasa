<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --terracota: #953d15; --caramelo: #c57d4c; --oliva: #a7bc72; --fundo: #fdfaf5; }
        body { background-color: var(--fundo); min-height: 100vh; display: flex; flex-direction: column; }
        .nav-premium { background-color: var(--terracota); border-bottom: 4px solid var(--caramelo); padding: 12px 0; }
        .table-container { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 30px; }
        .btn-logout { background-color: white; color: var(--terracota); border-radius: 50px; font-weight: bold; border: none; padding: 6px 15px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="nav-premium sticky-top shadow-sm text-white">
        <div class="container d-flex justify-content-between align-items-center px-3">
            <h1 class="h5 mb-0 fw-bold">⚙️ ADMINISTRAÇÃO</h1>
            <a href="/login-admin" class="btn-logout">SAIR</a>
        </div>
    </nav>

    <div class="container py-4 flex-grow-1">
        <div class="table-container p-3 p-md-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr class="small text-uppercase fw-bold text-muted">
                            <th>Nome</th>
                            <th>Cidade</th>
                            <th>WhatsApp</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for prof in profissionais %}
                        <tr>
                            <td><div class="fw-bold" style="color: var(--terracota);">{{ prof.nome }}</div><div class="small text-muted">{{ prof.categoria.nome }}</div></td>
                            <td class="small fw-bold">📍 {{ prof.cidade }}</td>
                            <td><a href="https://wa.me/55{{ prof.telefone }}" class="text-decoration-none text-success fw-bold small">📱 Abrir Conversa</a></td>
                            <td class="text-center">
                                <a href="/admin/deletar/{{ prof.id }}" class="btn btn-sm btn-outline-danger border-0" onclick="return confirm('Excluir este anúncio permanentemente?')">🗑️</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="text-center py-4 text-muted small">Caju Valley Tecnologia 🌵</footer>
</body>
</html>

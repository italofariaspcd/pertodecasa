<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Admin Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f1ea;
            padding: 15px;
        }

        .admin-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .table-responsive {
            border-radius: 15px;
        }

        .form-sm-input {
            font-size: 0.85rem;
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="admin-container">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">
                <h4 class="fw-bold mb-0">Gestão de Profissionais</h4>
                <div class="d-flex gap-2 w-100 w-md-auto">
                    <a href="/admin/exportar" class="btn btn-success btn-sm flex-fill">📥 Exportar CSV</a>
                    <a href="/" class="btn btn-dark btn-sm flex-fill">Sair</a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle shadow-sm">
                    <thead class="table-dark">
                        <tr class="small">
                            <th>PROFISSIONAL</th>
                            <th>CIDADE</th>
                            <th>CONTATO</th>
                            <th>STATUS</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in profissionais %}
                        <tr>
                            <form action="/admin/editar/{{ p.id }}" method="POST">
                                <td><input type="text" name="nome" value="{{ p.nome }}" class="form-sm-input w-100">
                                </td>
                                <td><input type="text" name="cidade" value="{{ p.cidade }}" class="form-sm-input w-100">
                                </td>
                                <td><input type="text" name="telefone" value="{{ p.telefone }}"
                                        class="form-sm-input w-100"></td>
                                <td>
                                    <select name="is_destaque" class="form-select form-select-sm">
                                        <option value="True" {% if p.is_destaque %}selected{% endif %}>Destaque</option>
                                        <option value="False" {% if not p.is_destaque %}selected{% endif %}>Normal
                                        </option>
                                    </select>
                                </td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                                        <a href="/admin/deletar/{{ p.id }}" class="btn btn-danger btn-sm"
                                            onclick="return confirm('Excluir permanentemente?')">🗑️</a>
                                    </div>
                                </td>
                            </form>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>

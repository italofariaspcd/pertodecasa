<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #e8dcc4; padding: 20px;">
    <div class="container bg-white p-4 rounded-4 shadow-sm">
        <div class="d-flex justify-content-between mb-4 align-items-center">
            <h4 class="fw-bold mb-0">Gestão de Anúncios</h4>
            <a href="/" class="btn btn-dark btn-sm rounded-pill">Sair do Painel</a>
        </div>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Nome</th><th>Cidade</th><th>Contato</th><th>Ação</th></tr></thead>
                <tbody>
                    {% for p in profissionais %}
                    <tr>
                        <td><b>{{ p.nome }}</b><br><small class="text-muted">{{ p.categoria.nome }}</small></td>
                        <td>{{ p.cidade }}</td>
                        <td>{{ p.telefone }}</td>
                        <td><a href="/admin/deletar/{{ p.id }}" class="btn btn-danger btn-sm rounded-pill" onclick="return confirm('Deseja deletar?')">Deletar</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

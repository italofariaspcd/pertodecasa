<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Perto de Casa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>⚙️ Painel de Controle</h2>
            <a href="/" class="btn btn-secondary">Voltar ao Site</a>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered bg-white shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Nome</th>
                        <th>WhatsApp</th>
                        <th>Cidade</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for prof in profissionais %}
                    <tr>
                        <td>{{ prof.nome }}</td>
                        <td>{{ prof.telefone }}</td>
                        <td>{{ prof.cidade }}</td>
                        <td>
                            {% if prof.ativo %}
                                <span class="badge bg-success">Online</span>
                            {% else %}
                                <span class="badge bg-danger">Oculto</span>
                            {% endif %}
                        </td>
                        <td>
                            <a href="/admin/alternar/{{ prof.id }}" class="btn btn-sm btn-warning fw-bold">
                                {% if prof.ativo %} Ocultar {% else %} Reativar {% endif %}
                            </a>
                            <a href="/admin/deletar/{{ prof.id }}" class="btn btn-sm btn-danger fw-bold" onclick="return confirm('Apagar {{ prof.nome }} definitivamente?')">
                                🗑️ Apagar
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

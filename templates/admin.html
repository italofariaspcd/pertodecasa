<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>🏠 Gestão Master - Perto de Casa SE</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f4f1ea; padding: 20px;">
    <div class="container-fluid bg-white p-4 rounded-4 shadow">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Painel de Controle</h4>
            <div><a href="/admin/exportar" class="btn btn-success btn-sm">Exportar Banco (CSV)</a><a href="/"
                    class="btn btn-dark btn-sm">Sair</a></div>
        </div>
        <div class="table-responsive">
            <table class="table table-sm align-middle table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Profissional</th>
                        <th>WhatsApp</th>
                        <th>Cidade</th>
                        <th>Endereço</th>
                        <th>Nº</th>
                        <th>Destaque</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in profissionais %}
                    <tr>
                        <form action="/admin/editar/{{ p.id }}" method="POST">
                            <td><input type="text" name="nome" value="{{ p.nome }}"
                                    class="form-control form-control-sm"></td>
                            <td><input type="text" name="telefone" value="{{ p.telefone }}"
                                    class="form-control form-control-sm"></td>
                            <td><input type="text" name="cidade" value="{{ p.cidade }}"
                                    class="form-control form-control-sm"></td>
                            <td><input type="text" name="endereco" value="{{ p.endereco }}"
                                    class="form-control form-control-sm"></td>
                            <td><input type="text" name="numero" value="{{ p.numero }}"
                                    class="form-control form-control-sm" style="width: 60px;"></td>
                            <td><select name="is_destaque" class="form-select form-select-sm">
                                    <option value="True" {% if p.is_destaque %}selected{% endif %}>Sim</option>
                                    <option value="False" {% if not p.is_destaque %}selected{% endif %}>Não</option>
                                </select></td>
                            <td class="d-flex gap-1"><button class="btn btn-primary btn-sm">OK</button><a
                                    href="/admin/deletar/{{ p.id }}" class="btn btn-danger btn-sm">🗑️</a></td>
                        </form>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #e8dcc4; padding: 20px;">
    <div class="container bg-white p-4 rounded-4 shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Gestão de Anúncios</h4>
            <a href="/" class="btn btn-outline-dark btn-sm">Voltar ao Site</a>
        </div>
        <table class="table align-middle">
            <thead><tr><th>Profissional</th><th>Cidade</th><th>Ações</th></tr></thead>
            <tbody>
                {% for p in profissionais %}
                <tr>
                    <td><b>{{ p.nome }}</b><br><small>{{ p.categoria.nome }}</small></td>
                    <td>{{ p.cidade }}</td>
                    <td><a href="/admin/deletar/{{ p.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Deletar permanentemente?')">🗑️ Deletar</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin - Perto de Casa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm border-start border-4 border-warning">
            <h4 class="fw-bold mb-0">⚙️ Administração</h4>
            <a href="/" class="btn btn-outline-dark btn-sm">Voltar ao Site</a>
        </div>

        <div class="table-responsive shadow-sm rounded bg-white p-2">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark small">
                    <tr>
                        <th>Nome</th>
                        <th>Contato</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody class="small">
                    {% for prof in profissionais %}
                    <tr>
                        <td class="fw-bold">{{ prof.nome }}</td>
                        <td>{{ prof.telefone }}</td>
                        <td>
                            {% if prof.ativo %} <span class="badge bg-success">Online</span> {% else %} <span class="badge bg-danger">Oculto</span> {% endif %}
                        </td>
                        <td class="text-center">
                            <a href="/admin/alternar/{{ prof.id }}" class="btn btn-sm btn-secondary mx-1" title="Ocultar/Mostrar">👁️</a>
                            <a href="/admin/editar/{{ prof.id }}" class="btn btn-sm btn-primary mx-1" title="Editar Cadastro">✏️ Editar</a>
                            <a href="/admin/deletar/{{ prof.id }}" class="btn btn-sm btn-danger mx-1" onclick="return confirm('Apagar definitivamente?')" title="Excluir">🗑️</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

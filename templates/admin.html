<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Perto de Casa SE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --terracota: #953d15; --caramelo: #c57d4c; --oliva: #a7bc72; --fundo-dark: #e8dcc4; }
        body { background-color: var(--fundo-dark); min-height: 100vh; display: flex; flex-direction: column; }
        .nav-premium { background-color: var(--terracota); border-bottom: 4px solid var(--caramelo); padding: 15px 0; }
        .table-container { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 30px; }
        .thead-dark { background-color: #2d1a12; color: white; }
        .rodape { background-color: #d8cbb3; color: #5d4037; border-top: 2px solid var(--terracota); padding: 30px 0; text-align: center; margin-top: auto; }
    </style>
</head>
<body>
    <nav class="nav-premium sticky-top shadow text-white">
        <div class="container d-flex justify-content-between align-items-center px-3">
            <h1 class="h5 mb-0 fw-bold">⚙️ GESTÃO DE ANÚNCIOS</h1>
            <a href="/login-admin" class="btn btn-light btn-sm fw-bold rounded-pill px-3">SAIR</a>
        </div>
    </nav>

    <div class="container py-4 flex-grow-1">
        <div class="table-container p-2 p-md-4 bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="thead-dark">
                        <tr class="small text-uppercase fw-bold">
                            <th class="ps-3">Profissional</th>
                            <th>Cidade</th>
                            <th>WhatsApp</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for prof in profissionais %}
                        <tr>
                            <td class="ps-3">
                                <div class="fw-bold" style="color: var(--terracota);">{{ prof.nome }}</div>
                                <div class="small text-muted text-uppercase" style="font-size: 0.7rem;">{{ prof.categoria.nome }}</div>
                            </td>
                            <td class="small fw-bold">📍 {{ prof.cidade }}</td>
                            <td><a href="https://wa.me/55{{ prof.telefone }}" class="text-decoration-none text-success fw-bold small">📱 Conversar</a></td>
                            <td class="text-center">
                                <a href="/admin/deletar/{{ prof.id }}" class="btn btn-sm btn-outline-danger border-0" onclick="return confirm('Excluir anúncio?')">🗑️</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="rodape">Caju Valley Tecnologia 🌵</footer>
</body>
</html>
